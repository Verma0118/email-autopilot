# Scout Agent targeting config. Three tracks, all scraped every run (caps apply).

tracks:
  startup_discovery:
    label: startup discovery
    email_type: startup_discovery
    daily_cap: 3
    who: >
      Operational practitioners at HIGH FLIGHT VOLUME drone/UAS operators:
      UAS program managers, chief pilots, DFR program leads, fleet supervisors,
      training leads. Organizations flying daily/weekly with dedicated crews,
      multi-office fleets, or 100+ pilot training programs.
    who_not: >
      Low-volume operators (~4 flights/month survey shops), sales/marketing
      people, C-suite of giant corporations.
    segments:
      - name: dfr-programs
        brief: Drone as First Responder and dock programs at US police/fire departments. Daily flights, BVLOS waivers, public records exposure.
      - name: utility-uas-crews
        brief: Utility company UAS programs with dedicated daily crews (poles, transmission, substations). Ameren-class, 200+ poles/day teams.
      - name: drone-delivery
        brief: Drone delivery operators with daily commercial flights (medical, retail, logistics). Flight ops managers and chief pilots.
      - name: multi-office-fleets
        brief: Engineering/survey firms with distributed multi-office drone fleets (Halff-class, 20+ offices). UAS managers owning fleet-wide records.
      - name: training-operations
        brief: UAS training orgs certifying 100+ pilots. Lead instructors and program directors who own certification records.

  internship:
    label: internship outreach
    email_type: cold_outreach
    daily_cap: 3
    who: >
      Practicing aerospace/mechanical engineers and engineering managers at
      Raytheon / RTX — especially Collins Aerospace — who a UIUC Aerospace
      sophomore could coffee-chat for internship advice. UIUC alumni preferred
      (use cold_outreach); non-alum only if a strong Collins/Raytheon engineer
      with no alum available. Roles: structures, mechanical design, propulsion,
      actuation, test, CFD, aerostructures.
    who_not: >
      Recruiters/HR, executives, salespeople, people outside Raytheon/RTX/
      Collins Aerospace, anyone with no findable engineering role.
    segments:
      - name: collins-aerospace
        brief: Collins Aerospace (RTX) engineers — Aerostructures, mechanical design, pumps/actuation, systems. Rockford IL and other Collins sites. UIUC alumni first.
      - name: raytheon-rtx
        brief: Raytheon / other RTX business-unit engineers in structures, mechanical, propulsion, test — especially UIUC alumni who can advise on RTX internship pipelines.
      - name: collins-uiuc-alums
        brief: Confirmed University of Illinois (UIUC) alumni currently at Collins Aerospace in engineering roles. Highest priority for coffee chats.

  nobe:
    label: NOBE
    email_type: nobe_pd_outreach
    daily_cap: 2
    who: >
      Product or engineering leaders at companies that need an ENGINEERED
      solution a student team could deliver in about 12 weeks to one semester
      (Sept–Dec, optional spring extension). Think CAD, fixture, prototype,
      mechanism, enclosure, DFM — a scoped physical deliverable, not strategy
      decks or pure software. Founders, heads of product, eng managers at
      small-to-mid companies. Champaign-Urbana / Illinois proximity is a plus.
    who_not: >
      Pure software / SaaS with no hardware need; companies whose "project"
      is marketing or research-only; giant corps where student PD dies in
      procurement; vague "innovation partnership" with no engineered artifact;
      generic info@ when a named leader is findable.
    segments:
      - name: engineered-pd-local
        brief: Champaign-Urbana / Research Park / central Illinois companies with a concrete 12-week engineered PD need (CAD, prototype, fixture, mechanism). Physical proximity to UIUC is the hook.
      - name: hardware-engineered-gap
        brief: Small-to-mid hardware/product companies shipping physical goods that clearly need a scoped student engineering deliverable this semester (not open-ended consulting).
      - name: mobility-engineered-pd
        brief: Small EV, e-bike, e-moto, and mobility hardware companies with a one-semester engineered project (GHOST Electric Motorcycles angle OK when relevant).

