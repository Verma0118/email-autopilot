# Scout Agent targeting config. Three tracks, all scraped every run (caps apply).

tracks:
  startup_discovery:
    label: startup discovery
    email_type: startup_discovery
    daily_cap: 3
    who: >
      Operational practitioners at HIGH FLIGHT VOLUME drone/UAS operators:
      UAS program managers, chief pilots, DFR program leads, fleet supervisors,
      training leads. Organizations flying daily/weekly with dedicated crews,
      multi-office fleets, or 100+ pilot training programs.
    who_not: >
      Low-volume operators (~4 flights/month survey shops), sales/marketing
      people, C-suite of giant corporations.
    segments:
      - name: dfr-programs
        brief: Drone as First Responder and dock programs at US police/fire departments. Daily flights, BVLOS waivers, public records exposure.
      - name: utility-uas-crews
        brief: Utility company UAS programs with dedicated daily crews (poles, transmission, substations). Ameren-class, 200+ poles/day teams.
      - name: drone-delivery
        brief: Drone delivery operators with daily commercial flights (medical, retail, logistics). Flight ops managers and chief pilots.
      - name: multi-office-fleets
        brief: Engineering/survey firms with distributed multi-office drone fleets (Halff-class, 20+ offices). UAS managers owning fleet-wide records.
      - name: training-operations
        brief: UAS training orgs certifying 100+ pilots. Lead instructors and program directors who own certification records.

  internship:
    label: internship outreach
    email_type: cold_outreach
    daily_cap: 3
    who: >
      Practicing aerospace/mechanical engineers and engineering managers at
      target companies who a UIUC Aerospace sophomore could coffee-chat for
      internship/co-op pipeline advice. STRONG PREFERENCE for University of
      Illinois (UIUC) alumni. Design, structures, propulsion, test, CFD roles.
    who_not: >
      Recruiters/HR, executives, salespeople, anyone with no findable
      engineering role.
    segments:
      - name: collins-aerospace
        brief: Collins Aerospace engineers, especially Aerostructures, mechanical design, pumps/actuation. Rockford IL and other sites. UIUC alumni first.
      - name: pratt-whitney
        brief: Pratt and Whitney engineers in CFD, performance, structures, test. East Hartford CT and West Palm Beach FL. Summer internship pipeline.
      - name: rtx-and-primes
        brief: RTX, Boeing, Lockheed, Northrop engineers in structures/propulsion/mechanical roles, especially UIUC alumni or early-career engineers who recently interned.
      - name: evtol-startups
        brief: Engineers at eVTOL and electric aviation companies (Joby, Archer, Beta, Wisk) in structures, motors, powertrain. UIUC alumni first.

  nobe:
    label: NOBE
    email_type: nobe_pd_outreach
    daily_cap: 2
    who: >
      Product/engineering leaders at small-to-mid hardware or consumer product
      companies who could sponsor a 12-week student CAD/engineering project
      (September to December). Founders, heads of product, engineering managers.
      Champaign-Urbana / Illinois companies get priority.
    who_not: >
      Companies with no physical product (pure software), giant corporations
      where a student project pitch dies in procurement, generic info@ inboxes
      when a named leader is findable.
    segments:
      - name: champaign-urbana-hardware
        brief: Hardware/product startups and manufacturers in Champaign-Urbana, Research Park, and central Illinois. Physical proximity to UIUC is the hook.
      - name: consumer-hardware-startups
        brief: Small consumer hardware startups (10-100 people) shipping physical products that need CAD, prototyping, or design-for-manufacturing help.
      - name: ev-mobility-startups
        brief: Small EV, e-bike, e-moto, and mobility hardware companies. GHOST Electric Motorcycles angle available for these.

