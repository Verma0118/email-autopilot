# ICP for prospecting. Source: Volant/Plans/mvp-proof-pack.md (high flight volume,
# corrected after Mark Martin discovery call 2026-07-09).

segments:
  - name: dfr-programs
    brief: >
      Drone as First Responder and dock-in-a-box programs at US police/fire
      departments. Continuous daily flights, BVLOS waivers, public records
      exposure. Target program managers, chief pilots, unit commanders.
  - name: utility-uas-crews
    brief: >
      Utility company UAS programs with dedicated crews flying daily
      (inspection of poles, transmission, substations). Ameren-class programs:
      200+ poles/day teams. Target UAS ops supervisors and mission specialists.
  - name: drone-delivery
    brief: >
      Drone delivery operators with daily commercial flights (medical,
      retail, logistics). Target flight ops managers, chief pilots, network
      ops leads. Not C-suite.
  - name: multi-office-fleets
    brief: >
      Engineering/survey firms with distributed multi-office drone fleets
      (Halff-class: 20+ offices, many pilots). Target UAS managers and chief
      pilots responsible for fleet-wide records and training.
  - name: training-operations
    brief: >
      UAS training organizations certifying 100+ pilots (Part 107 schools,
      LiDAR/RPIC training providers). Target lead instructors and program
      directors who own certification records.

